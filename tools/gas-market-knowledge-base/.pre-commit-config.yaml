# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
#
# Local hooks use `uv run` so they execute inside this Subproject environment.
repos:
  - repo: 'https://github.com/pre-commit/pre-commit-hooks'
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.20.0"
    hooks:
      - id: pyproject-fmt
        additional_dependencies:
          - toml-fmt-common==1.3.2
  - repo: local
    hooks:
      - id: forbid-generated-corpus-artifacts
        name: forbid generated corpus artifacts
        language: system
        entry: uv run python -c "raise SystemExit('Generated Gas market corpus artifacts belong under ENERGY_MARKET_CORPUS_ROOT, not git.')"
        files: ^(tools/gas-market-knowledge-base/)?generated/(bronze|silver|gold)/.+$
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check
        require_serial: true
        types:
          - python
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        require_serial: true
        types:
          - python
      - id: zuban-check
        name: zuban check
        language: system
        entry: uv run zuban check
        pass_filenames: false
      - id: pytest-unit
        name: pytest unit tests
        language: system
        entry: uv run pytest tests/unit -q
        pass_filenames: false
        always_run: true
