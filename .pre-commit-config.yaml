# Workspace root — prek discovers sub-project configs automatically.
# See: https://prek.j178.dev/workspace/
#
# To install the git hook:
#   prek install
#
# NOTE: local hooks in sub-projects use `language: system`, so the relevant
# virtual environment must be active before committing, e.g.:
#   source backend-services/dagster-user/aemo-etl/.venv/bin/activate
default_install_hook_types:
  - pre-commit
repos:
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        # Keep hadolint rules fully enabled at the workspace level.
        # Add per-project `args: [--ignore, RULE]` only when a concrete
        # Dockerfile pattern makes that exception necessary.
        files: ^(backend-services/.+/Dockerfile|infrastructure/aws-pulumi/.+/Dockerfile)$
        # .pre-commit-config.yaml
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.62
    hooks:
      - id: rumdl # Lint only (fails on issues)
        args:
          - --disable=MD013
          - --exclude=specs/**
      - id: rumdl-fmt # Auto-format and fail if issues remain
        args:
          - --disable=MD013
          - --exclude=specs/**
  - repo: local
    hooks:
      - id: lychee
        name: lychee link check
        language: system
        entry: lychee --offline
        files: ^[^/]+\.md$
        types:
          - markdown
