# Podman Compose — Dagster OSS local deployment
#
# Services
#   postgres          PostgreSQL 14 — Dagster run/schedule/event-log storage
#   localstack        LocalStack    — mocked AWS S3 for the aemo-etl code location
#   aemo-etl          Dagster gRPC code-location server
#   dagster-webserver Dagster UI + GraphQL API
#   dagster-daemon    Schedules, sensors, and run queue
#   marimo-dashboard Curated Marimo dashboard server (FastAPI + marimo ASGI)
#   marimo-codex-workspace
#                     Local-only Marimo-Codex research workspace
#
# The dagster-core image is built with DAGSTER_DEPLOYMENT=local which selects
# dagster.local.yaml and workspace.local.yaml as the active instance config.
# Change the build arg to "aws" when deploying to AWS (ECS run launcher).
#
# Usage
#   podman-compose up --build
#   Open http://localhost:3000
name: dagster-local
# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  dagster_network:
    name: dagster_network # explicit name prevents compose project prefix
    driver: bridge
# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:
  # -------------------------------------------------------------------------
  # PostgreSQL — Dagster instance storage backend
  # -------------------------------------------------------------------------
  postgres:
    build:
      context: ./postgres
    container_name: postgres
    restart: on-failure
    networks:
      - dagster_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DAGSTER_POSTGRES_HOSTNAME: ${DAGSTER_POSTGRES_HOSTNAME}
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
    # Postgres data is intentionally ephemeral — no volume mount.
    # Every `podman-compose down` starts from a clean state, which keeps
    # local dev simple. Add a named volume here if persistence is needed.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  # -------------------------------------------------------------------------
  # LocalStack — mocked AWS S3 (and any other AWS services needed locally)
  # -------------------------------------------------------------------------
  localstack:
    # image: docker.io/localstack/localstack:latest
    build:
      context: ./localstack/
    container_name: localstack
    restart: on-failure
    networks:
      - dagster_network
    environment:
      SERVICES: s3,dynamodb
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    volumes:
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/run/podman/podman.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"' && curl -sf http://localhost:4566/_localstack/health | grep -q '\"dynamodb\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  # -------------------------------------------------------------------------
  # aemo-etl-seed-localstack — optional cached Archive seed loader
  # -------------------------------------------------------------------------
  aemo-etl-seed-localstack:
    build:
      context: ./dagster-user/aemo-etl
      target: dagster-grpc
    container_name: aemo-etl-seed-localstack
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - dagster_network
    environment:
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
      LANDING_BUCKET: ${LANDING_BUCKET:-dev-energy-market-landing}
      ARCHIVE_BUCKET: ${ARCHIVE_BUCKET:-dev-energy-market-archive}
      AEMO_ETL_E2E_SEED_ENABLED: ${AEMO_ETL_E2E_SEED_ENABLED:-0}
      AEMO_ETL_E2E_SEED_ROOT: /var/lib/aemo-etl/e2e-seed
      AEMO_ETL_E2E_SEED_RAW_LATEST_COUNT: ${AEMO_ETL_E2E_SEED_RAW_LATEST_COUNT:-3}
      AEMO_ETL_E2E_SEED_ZIP_LATEST_COUNT: ${AEMO_ETL_E2E_SEED_ZIP_LATEST_COUNT:-3}
    volumes:
      - ./.e2e/aemo-etl:/var/lib/aemo-etl/e2e-seed
    command:
      - /bin/sh
      - -c
      - |
        if [ "$${AEMO_ETL_E2E_SEED_ENABLED:-0}" != "1" ]; then
          echo "AEMO ETL e2e archive seed disabled."
          exit 0
        fi
        aemo-e2e-archive-seed load-localstack \
          --seed-root "$${AEMO_ETL_E2E_SEED_ROOT}" \
          --archive-bucket "$${ARCHIVE_BUCKET}" \
          --landing-bucket "$${LANDING_BUCKET}" \
          --raw-latest-count "$${AEMO_ETL_E2E_SEED_RAW_LATEST_COUNT:-3}" \
          --zip-latest-count "$${AEMO_ETL_E2E_SEED_ZIP_LATEST_COUNT:-3}"
  # -------------------------------------------------------------------------
  # aemo-etl — Dagster gRPC code-location server
  # workspace.yaml (aliased from workspace.local.yaml) connects to this at host aemo-etl:4000
  # -------------------------------------------------------------------------
  aemo-etl:
    build:
      context: ./dagster-user/aemo-etl
      target: dagster-grpc
    container_name: aemo-etl
    restart: on-failure
    depends_on:
      localstack:
        condition: service_healthy
      aemo-etl-seed-localstack:
        condition: service_completed_successfully
    networks:
      - dagster_network
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home/
      DAGSTER_POSTGRES_HOSTNAME: ${DAGSTER_POSTGRES_HOSTNAME}
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
      AWS_S3_LOCKING_PROVIDER: dynamodb
      DAGSTER_FAILURE_ALERT_TOPIC_ARN: ${DAGSTER_FAILURE_ALERT_TOPIC_ARN:-}
      DAGSTER_FAILURE_ALERT_BASE_URL: ${DAGSTER_FAILURE_ALERT_BASE_URL:-https://localhost/dagster-webserver/admin}
    healthcheck:
      test: ["CMD-SHELL", "dagster api grpc-health-check -p 4000"]
      interval: 3s
      timeout: 1s
      retries: 20
      start_period: 3s
    command:
      - dagster
      - code-server
      - start
      - -h
      - "0.0.0.0"
      - -p
      - "4000"
      - -m
      - aemo_etl.definitions
  # -------------------------------------------------------------------------
  # marimo-dashboard — curated Marimo dashboard server (analytics layer)
  # Caddy proxies /marimo traffic to this service. Codex tooling is not enabled
  # in this image.
  # -------------------------------------------------------------------------
  marimo-dashboard:
    build:
      context: ./marimo
      target: dashboard
    container_name: marimo-dashboard
    restart: on-failure
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - dagster_network
    environment:
      MARIMO_WORKSPACE_KIND: dashboard
      MARIMO_NOTEBOOKS_DIR: /opt/marimo/notebooks
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
    volumes:
      - ./marimo/notebooks:/opt/marimo/notebooks:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2718/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  # -------------------------------------------------------------------------
  # marimo-codex-workspace — local-only Marimo research workspace.
  # The service exposes marimo edit mode on a localhost-only port and mounts a
  # separate writable workspace with AGENTS.md guidance. It must not be used for
  # deployed Codex execution without a security review.
  # -------------------------------------------------------------------------
  marimo-codex-workspace:
    build:
      context: ./marimo
      target: codex-workspace
    container_name: marimo-codex-workspace
    restart: on-failure
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - dagster_network
    ports:
      - "127.0.0.1:2719:2718"
    environment:
      MARIMO_WORKSPACE_KIND: codex-research
      MARIMO_WORKSPACE_ROOT: /workspace
      MARIMO_NOTEBOOKS_DIR: /workspace/notebooks
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
    volumes:
      - ./marimo/research-workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sfL http://localhost:2718"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
  # -------------------------------------------------------------------------
  # authentication — FastAPI OIDC proxy (Cognito → Dagster webserver)
  # -------------------------------------------------------------------------
  authentication:
    build:
      context: ./authentication
      target: deploy
    container_name: authentication
    restart: on-failure
    networks:
      - dagster_network
    environment:
      COGNITO_DAGSTER_AUTH_CLIENT_ID: ${COGNITO_DAGSTER_AUTH_CLIENT_ID}
      COGNITO_DAGSTER_AUTH_SERVER_METADATA_URL: ${COGNITO_DAGSTER_AUTH_SERVER_METADATA_URL}
      COGNITO_TOKEN_SIGNING_KEY_URL: ${COGNITO_TOKEN_SIGNING_KEY_URL}
      COGNITO_DAGSTER_AUTH_CLIENT_SECRET: ${COGNITO_DAGSTER_AUTH_CLIENT_SECRET}
      WEBSITE_ROOT_URL: ${WEBSITE_ROOT_URL}
      FORWARDED_ALLOW_IPS: "*"
  # -------------------------------------------------------------------------
  # caddy — reverse proxy + static file server
  # Local target: plain HTTP on :8080, no TLS/ACME
  # -------------------------------------------------------------------------
  caddy:
    build:
      context: ./caddy
    container_name: caddy
    restart: on-failure
    depends_on:
      - authentication
      - dagster-webserver-admin
      - dagster-webserver-guest
      - marimo-dashboard
    networks:
      - dagster_network
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    environment:
      ROOT_DNS: ${ROOT_DNS}
      LOCAL_CERTS: ${LOCAL_CERTS}
      DEVELOPER_EMAIL: ${DEVELOPER_EMAIL}
      DAGSTER_WEBSERVER_GUEST: ${DAGSTER_WEBSERVER_GUEST}
      DAGSTER_WEBSERVER_ADMIN: ${DAGSTER_WEBSERVER_ADMIN}
      DAGSTER_AUTHSERVER: ${DAGSTER_AUTHSERVER}
      MARIMO_SERVER: ${MARIMO_SERVER}
  # -------------------------------------------------------------------------
  # dagster-webserver — Dagster UI and GraphQL API
  # -------------------------------------------------------------------------
  dagster-webserver-admin:
    build:
      context: ./dagster-core
      target: deploy
      args:
        DAGSTER_DEPLOYMENT: local
    container_name: dagster-webserver-admin
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      aemo-etl:
        condition: service_healthy
    networks:
      - dagster_network
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home/
      DOCKER_HOST: unix:///run/podman/podman.sock
      DAGSTER_POSTGRES_HOSTNAME: ${DAGSTER_POSTGRES_HOSTNAME}
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
      AWS_S3_LOCKING_PROVIDER: dynamodb
    volumes:
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/run/podman/podman.sock
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
      - --path-prefix
      - /dagster-webserver/admin
  dagster-webserver-guest:
    build:
      context: ./dagster-core
      target: deploy
      args:
        DAGSTER_DEPLOYMENT: local
    container_name: dagster-webserver-guest
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      aemo-etl:
        condition: service_healthy
    networks:
      - dagster_network
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home/
      DOCKER_HOST: unix:///run/podman/podman.sock
      DAGSTER_POSTGRES_HOSTNAME: ${DAGSTER_POSTGRES_HOSTNAME}
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
      AWS_S3_LOCKING_PROVIDER: dynamodb
    volumes:
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/run/podman/podman.sock
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
      - --path-prefix
      - /dagster-webserver/guest
  # -------------------------------------------------------------------------
  # dagster-daemon — schedules, sensors, run queue processor
  # -------------------------------------------------------------------------
  dagster-daemon:
    build:
      context: ./dagster-core
      target: deploy
      args:
        DAGSTER_DEPLOYMENT: local
    container_name: dagster-daemon
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      aemo-etl:
        condition: service_healthy
    networks:
      - dagster_network
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home/
      DOCKER_HOST: unix:///run/podman/podman.sock
      DAGSTER_POSTGRES_HOSTNAME: ${DAGSTER_POSTGRES_HOSTNAME}
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ALLOW_HTTP: true
      AWS_S3_LOCKING_PROVIDER: dynamodb
    volumes:
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/run/podman/podman.sock
    command:
      - dagster-daemon
      - run
      - -w
      - workspace.yaml
