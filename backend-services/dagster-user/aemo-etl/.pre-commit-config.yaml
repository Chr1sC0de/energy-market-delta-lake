# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# orphan: true ensures files here are only processed by this config and not
# re-processed by the workspace root config (avoids double-processing).
#
# All local hooks use `uv run --no-sync` as the entry prefix so they always
# execute inside this project's own virtual environment, regardless of what is
# (or isn't) activated in the calling shell. This makes the workspace root
# pre-commit work correctly even when multiple sub-projects each have their own
# incompatible environments.
repos:
  - repo: 'https://github.com/pre-commit/pre-commit-hooks'
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.16.1"
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - (^.*\.lock$|^.*/\.envrc$|^infrastructure/aws-pulumi/Pulumi\..*\.yaml$|^\.secrets\.baseline$)
  - repo: local
    hooks:
      - id: shfmt
        name: shell format
        language: system
        entry: uv run shfmt --write
        files: ^scripts/.*
      - id: shellcheck
        name: shellcheck
        language: system
        entry: uv run shellcheck
        files: ^scripts/.*
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check
        types:
          - python
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types:
          - python
      - id: zuban-check
        name: zuban check
        language: system
        entry: uv run zuban check --strict
        pass_filenames: false
      - id: pytest-unit
        name: pytest-unit
        entry: uv run pytest
        args:
          - --cov-fail-under=100
          - --cov=aemo_etl
          - --cov-report=term-missing
          - --cov-report=html
          - -n=4
          - tests/unit
        language: system
        pass_filenames: false
      - id: pytest-integration
        name: pytest-integration
        entry: uv run pytest
        args:
          - --testmon
          - -n=4
          - tests/integration
        language: system
        pass_filenames: false
      - id: dagster-check-defs
        name: check dagster definitions
        entry: uv run dg check defs
        language: system
        pass_filenames: false
      - id: dagster-check-toml
        name: check dagster toml
        entry: uv run dg check toml
        language: system
        pass_filenames: false
      - id: dagster-check-yaml
        name: check dagster yaml
        entry: uv run dg check yaml
        language: system
        pass_filenames: false
