repos:
  - repo: local
    hooks:
      - id: shfmt
        name: shell format
        language: python
        additional_dependencies:
          - shfmt-py==3.12.0.2
        entry: shfmt --write
        files: ^.*\.sh$
        exclude: ^(.*/vendor/.*|.*/generated/.*|.*/\.venv/.*)$
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        files: ^.*\.sh$
        exclude: ^(.*/vendor/.*|.*/generated/.*|.*/\.venv/.*)$
      - id: shell-script-headers
        name: shell script headers
        language: system
        entry: python3 ../scripts/check_shell_script_headers.py
        files: ^.*\.sh$
        types:
          - shell
          - executable
        exclude: ^(.*/vendor/.*|.*/generated/.*|.*/\.venv/.*)$
